# 本文件为本地基础设施连接模板，不会被 Spring 自动加载。
# 使用方式：
# 1) 复制为 application-local-infra.yml
# 2) 在 application-local.yml 中按需引入或手工合并

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/nexus_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: "<YOUR_MYSQL_PASSWORD>"
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 3s

agent:
  rag:
    # Hybrid RAG 主链路
    provider: hybrid
    top-k: 5
    embedding:
      # provider=openai 或 tei（二选一）
      provider: tei
      base-url: http://127.0.0.1:18080
      api-key: ""
      model: BAAI/bge-m3
      timeout-ms: 15000
      max-retries: 1
      tei-path: /embed
    hybrid:
      kb-id: company_kd
      vector-top-k: 10
      graph-top-k: 10
      vector-weight: 0.7
      graph-weight: 0.3
      chroma:
        endpoint: http://127.0.0.1:8000
        collection: nexus_kb_1024
        timeout-ms: 1200
      neo4j:
        endpoint: http://127.0.0.1:7474
        username: neo4j
        password: "<YOUR_NEO4J_PASSWORD>"
        tx-path: /db/neo4j/tx/commit
        max-depth: 2
        timeout-ms: 1200
