# 本文件为本地基础设施连接模板，不会被 Spring 自动加载。
# 使用方式：
# 1) 复制为 application-local-infra.yml
# 2) 在 application-local.yml 中按需引入或手工合并

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/nexus_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: "<YOUR_MYSQL_PASSWORD>"
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 3s

agent:
  rag:
    # 本地链路打通建议先用 local_vector（不依赖 ES）
    provider: local_vector
    embedding:
      # 常用向量模型：text-embedding-3-small（OpenAI 兼容）
      base-url: https://api.openai.com/v1
      api-key: "<YOUR_EMBEDDING_API_KEY>"
      model: text-embedding-3-small
      timeout-ms: 15000
      max-retries: 1
    # 后续接入 ES 时再切 provider=elastic，并填写以下连接参数
    elastic:
      base-url: http://127.0.0.1:9200
      index: agent_knowledge_chunks
      api-key: "<YOUR_ELASTIC_API_KEY>"
      username: ""
      password: ""
