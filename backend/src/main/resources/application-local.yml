spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 3s

# M4 本地模型配置（DeepSeek）
# 注意：请填入你自己的密钥，不要提交真实密钥到仓库。
agent:
  llm:
    provider: deepseek
    base-url: https://api.deepseek.com/v1
    api-key: ""
    model: deepseek-chat
    timeout-ms: 30000
    max-retries: 2
    stream: true
  memory:
    provider: redis
    window-size: 6
    key-prefix: "agent:memory:"
    ttl-seconds: 86400
