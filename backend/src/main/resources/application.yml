server:
  port: 8080

spring:
  application:
    name: nexus-agent

agent:
  llm:
    provider: mock
    base-url: ""
    api-key: ""
    model: deepseek-chat
    timeout-ms: 30000
    max-retries: 2
    stream: true
    function-calling-enabled: true
  skill:
    enabled: true
    general-system-prompt: "你是一个严谨的软件开发助手。请给出准确、可执行、结构清晰的回答。"
    tool-synthesis-prompt: "你是一个严谨的软件开发助手。请基于工具结果回答用户问题，禁止编造工具未返回的信息。"
    tool-fallback-prompt: "你是一个严谨的软件开发助手。工具调用失败时，请明确说明不确定性并给出可执行替代建议。"
  mcp:
    enabled: false
    tool-prefix: "mcp."
    stdio:
      enabled: true
      command: ""
      args: []
      env: {}
      request-timeout-ms: 10000
      init-timeout-ms: 10000
  tool-risk:
    enabled: true
    block-level: HIGH
  memory:
    enabled: true
    provider: in_memory
    window-size: 6
    key-prefix: "agent:memory:"
    ttl-seconds: 86400
  rag:
    enabled: true
    provider: mock
    top-k: 3
    local-documents:
      - "Nexus Agent 支持 Session / Run / SSE 事件流，便于追踪每次执行。"
      - "工具系统走 LangChain4j function calling，支持风险分级与审批。"
      - "记忆层支持 in_memory 与 redis 切换，默认窗口大小为 6。"
      - "RAG 结果会在 THINK 前注入上下文，并通过 rag.retrieved 事件可观测。"
      - "系统在模型连续失败时启用熔断，快速失败并保护主链路。"
    embedding:
      base-url: ""
      api-key: ""
      model: text-embedding-3-small
      timeout-ms: 15000
      max-retries: 1
    hybrid:
      query2doc:
        enabled: false
        max-queries: 3
      parallel:
        threads: 6
        task-timeout-ms: 1800
        route-timeout-ms: 2500
      rerank:
        enabled: false
        endpoint: http://localhost:18081
        path: /rerank
        timeout-ms: 1800
        candidate-top-k: 20
        weight: 0.75
    elastic:
      base-url: ""
      index: agent_knowledge_chunks
      api-key: ""
      username: ""
      password: ""
  stability:
    circuit-breaker-enabled: true
    circuit-failure-threshold: 3
    circuit-open-ms: 30000

kb:
  build:
    enabled: false
    exit-after-run: true
    kb-id: default_kb
    input: docs/kb/*.md
    chunk-size: 600
    chunk-overlap: 80
    embedding:
      provider: openai
      base-url: ""
      api-key: ""
      model: text-embedding-3-small
      timeout-ms: 15000
      max-retries: 1
      tei-path: /embed
    vector:
      endpoint: http://localhost:8000
      collection: nexus_kb
      upsert-path-template: /api/v1/collections/%s/upsert
    graph:
      endpoint: http://localhost:7474
      username: neo4j
      password: ""
      tx-path: /db/neo4j/tx/commit
      max-triples-per-chunk: 20
